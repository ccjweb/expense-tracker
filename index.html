<!DOCTYPE html>

<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>家庭記帳系統</title>

    <style>

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f7f9fa; padding: 15px; margin: 0; }

        .container { max-width: 420px; margin: 0 auto; background: white; padding: 20px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); box-sizing: border-box; }

        h2 { text-align: center; color: #333; margin: 0 0 20px 0; font-size: 20px; }

        .form-group { margin-bottom: 18px; }

        .flex-row { display: flex; gap: 15px; margin-bottom: 18px; align-items: flex-end; }

        .col-half { flex: 1; min-width: 0; }

        .col-auto { flex: 0 0 auto; }

        label.section-title { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }

        input[type="date"], input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; height: 42px; }

        .radio-group { display: flex; flex-wrap: wrap; gap: 8px; }

        .radio-group input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }

        .radio-group label { padding: 8px 14px; border: 1px solid #ccc; border-radius: 20px; background-color: #fff; color: #555; cursor: pointer; font-size: 14px; transition: all 0.2s ease; }

        .radio-group input[type="radio"]:checked + label { background-color: #4CAF50; color: white; border-color: #4CAF50; font-weight: bold; }

        button.submit-btn { background-color: #4CAF50; color: white; border: none; padding: 0 20px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; height: 42px; }

        #status { margin-top: 10px; text-align: center; font-weight: bold; color: #2e7d32; font-size: 14px; height: 20px; }

    </style>

</head>

<body>

    <div class="container">

        <h2>💸 記帳輸入</h2>

        <form id="expenseForm">

            <div class="form-group">

                <label class="section-title">日期</label>

                <input type="date" id="date" required>

            </div>

            <div class="form-group">

                <label class="section-title">支出類別</label>

                <div id="category-container" class="radio-group">載入中...</div>

            </div>

            <div class="form-group">

                <label class="section-title">項目名稱</label>

                <input type="text" id="item" placeholder="例如：尿布" required>

            </div>

            <div class="form-group">

                <label class="section-title">通路</label>

                <div id="channel-container" class="radio-group">載入中...</div>

            </div>

            <div class="flex-row">

                <div class="col-half">

                    <label class="section-title">成員</label>

                    <div id="member-container" class="radio-group">載入中...</div>

                </div>

                <div class="col-half">

                    <label class="section-title">金額</label>

                    <input type="number" id="amount" placeholder="輸入數字" required>

                </div>

            </div>

            <div class="flex-row" style="margin-bottom: 0;">

                <div class="col-half">

                    <label class="section-title">備註</label>

                    <input type="text" id="note" placeholder="選填">

                </div>

                <div class="col-auto">

                    <button type="button" id="submitBtn" class="submit-btn" onclick="handleFormSubmit()">送出</button>

                </div>

            </div>

        </form>

        <div id="status"></div>

    </div>



    <script>

        const API_URL = "https://script.google.com/macros/s/AKfycbyXQa_oP9rYUkJYAQUTAQ7hRuv6_Kq5qRH9-E3rvI21cj5cIAAm8P7HLInhIpjDkdFX/exec";



        window.onload = () => {

            document.getElementById('date').valueAsDate = new Date();

            fetch(API_URL)

                .then(res => res.json())

                .then(data => {

                    fillRadio('member-container', 'member', data.members);

                    fillRadio('category-container', 'category', data.categories);

                    fillRadio('channel-container', 'channel', data.channels);

                });

        };



        function fillRadio(id, name, list) {

            const container = document.getElementById(id);

            container.innerHTML = list.map((item, i) => 

                `<input type="radio" name="${name}" id="${name}_${i}" value="${item}" required>

                 <label for="${name}_${i}">${item}</label>`).join('');

        }



        function handleFormSubmit() {

            const btn = document.getElementById('submitBtn');

            btn.disabled = true; 

            btn.innerText = '寫入中...';

            

            const data = {

                date: document.getElementById('date').value,

                member: document.querySelector('input[name="member"]:checked')?.value || '',

                category: document.querySelector('input[name="category"]:checked')?.value || '',

                item: document.getElementById('item').value,

                amount: document.getElementById('amount').value,

                channel: document.querySelector('input[name="channel"]:checked')?.value || '',

                note: document.getElementById('note').value

            };



            fetch(API_URL, { method: "POST", body: JSON.stringify(data) })

                .then(() => {

                    alert("記帳成功！");

                    document.getElementById('expenseForm').reset();

                    btn.disabled = false; 

                    btn.innerText = '送出';

                })

                .catch(err => {

                    alert("發生錯誤，請稍後再試");

                    btn.disabled = false; 

                    btn.innerText = '送出';

                });

        }

    </script>

</body>

</html>
